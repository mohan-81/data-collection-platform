<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segmento Collector</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            /* Slate 950 */
            color: #f8fafc;
        }

        /* Glassmorphism Navbar */
        .glass-nav {
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link {
            font-size: 0.875rem;
            font-weight: 600;
            color: #94a3b8;
            /* Slate 400 */
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: #22d3ee;
            /* Cyan 400 */
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #22d3ee;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .btn-premium {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.3);
        }

        .issue-center-panel {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .issue-item {
            border: 1px solid rgba(148, 163, 184, 0.15);
            background: rgba(15, 23, 42, 0.55);
        }

        .issue-dot-error {
            background: #ef4444;
        }

        .issue-dot-warning {
            background: #f59e0b;
        }

        .issue-dot-info {
            background: #38bdf8;
        }
    </style>
</head>

<body class="antialiased">

    <nav class="glass-nav fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-6 lg:px-10 py-4 flex justify-between items-center">

            <a href="/" class="flex items-center gap-3 group">
                <img src="/static/logo.png" alt="Segmento Logo"
                    class="w-12 h-12 rounded object-contain bg-white shadow-lg shadow-cyan-500/20 group-hover:scale-105 transition-transform duration-300">
                <div class="flex flex-col">
                    <span class="text-xl font-extrabold tracking-tight leading-none text-white">Segmento</span>
                    <span class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest mt-0.5">Collector</span>
                </div>
            </a>

            <div class="hidden md:flex items-center space-x-10">
                <a href="/" class="nav-link">Home</a>
                <a href="/tracking" class="nav-link">Web Tracking</a>
                <a href="/connectors" class="nav-link">Connectors</a>
            </div>

            <div class="flex items-center gap-6">
                {% if is_logged_in %}
                <a href="/usage" class="text-sm font-bold text-slate-400 hover:text-white transition-colors">Usage</a>
                <a href="/account" class="text-sm font-bold text-slate-400 hover:text-white transition-colors">Account &
                    Billing</a>
                <a href="/logout"
                    class="btn-premium px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold rounded-xl border border-slate-700">
                    Logout
                </a>
                {% else %}
                <a href="/login" class="text-sm font-bold text-slate-400 hover:text-white transition-colors">Login</a>
                <a href="/signup"
                    class="btn-premium px-6 py-2.5 bg-cyan-500 hover:bg-cyan-400 text-slate-950 text-xs font-bold rounded-xl shadow-lg shadow-cyan-500/10">
                    Get Started
                </a>
                {% endif %}
            </div>
        </div>
    </nav>
    <!-- Smart Input Companion -->
    <div id="smart-companion"
        class="fixed pointer-events-none transition-all duration-500 ease-out opacity-0 z-50 flex items-center justify-center transform scale-50">
        <div class="relative w-8 h-8 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-2 border-cyan-400 border-t-transparent animate-spin">
            </div>
            <div class="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_15px_rgba(34,211,238,1)] animate-pulse"></div>
            <div class="absolute -inset-2 bg-cyan-400/20 rounded-full blur-sm animate-ping opacity-50"></div>
        </div>
    </div>



    <!-- Scroll to Top Button -->
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="scrollTopBtn"
        class="fixed bottom-24 right-8 z-40 bg-cyan-500 hover:bg-cyan-400 p-3 rounded-full shadow-[0_0_20px_rgba(34,211,238,0.5)] border border-cyan-300 text-slate-900 transition-all opacity-0 translate-y-4 duration-300 hover:-translate-y-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18">
            </path>
        </svg>
    </button>

    <div id="issueToastStack" class="fixed top-24 right-6 z-[90] space-y-3 w-[min(92vw,26rem)] pointer-events-none">
    </div>

    <button id="issueCenterToggle"
        class="fixed bottom-8 right-8 z-[90] px-4 py-3 rounded-xl bg-slate-900/90 text-slate-100 border border-slate-700 hover:border-cyan-400/50 shadow-xl text-xs font-bold tracking-widest uppercase flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-cyan-400"></span>
        Issue Center
    </button>

    <div id="issueCenterPanel"
        class="issue-center-panel fixed right-6 bottom-24 z-[95] w-[min(94vw,30rem)] max-h-[70vh] rounded-2xl shadow-2xl hidden overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-700/60 flex items-center justify-between">
            <div>
                <h3 class="text-sm font-bold text-white tracking-wide">Runtime Issues</h3>
                <p class="text-xs text-slate-400">Connector sync, auth, and API errors</p>
            </div>
            <button id="issueCenterClear" class="text-xs text-slate-300 hover:text-white font-semibold">Clear</button>
        </div>
        <div id="issueCenterList" class="p-4 space-y-3 overflow-y-auto max-h-[58vh]"></div>
    </div>

    <div class="h-24"></div>

    <main class="relative z-10 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-white/5 py-12 mt-20 text-center relative z-20 bg-[#020617]">
        <div class="flex justify-center mb-6">
            <img src="/static/logo.png"
                class="h-8 opacity-50 contrast-0 grayscale transition-all hover:grayscale-0 hover:opacity-100 hover:contrast-100">
        </div>
        <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.3em]">
            © 2026 Segmento Data Technologies — Collector Platform
        </p>
    </footer>

    <script>
        // Scroll to top button visibility
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            if (window.scrollY > 300) {
                btn.classList.remove('opacity-0', 'translate-y-4');
                btn.classList.add('opacity-100', 'translate-y-0');
            } else {
                btn.classList.add('opacity-0', 'translate-y-4');
                btn.classList.remove('opacity-100', 'translate-y-0');
            }
        });

        // Smart Companion Logic
        const smartCompanion = document.getElementById('smart-companion');

        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                const rect = e.target.getBoundingClientRect();
                smartCompanion.style.top = `${rect.top + (rect.height / 2) - 16}px`;
                // Position inside the right edge of the input
                smartCompanion.style.left = `${rect.left + rect.width - 40}px`;
                smartCompanion.style.opacity = '1';
                smartCompanion.style.transform = 'scale(1)';
            }
        });

        document.addEventListener('focusout', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
                smartCompanion.style.opacity = '0';
                smartCompanion.style.transform = 'scale(0.5)';
            }
        });

    </script>

    <script>
        (function () {
            const toastStack = document.getElementById('issueToastStack');
            const panel = document.getElementById('issueCenterPanel');
            const list = document.getElementById('issueCenterList');
            const toggleBtn = document.getElementById('issueCenterToggle');
            const clearBtn = document.getElementById('issueCenterClear');
            const events = [];
            const seen = new Map();
            const maxEvents = 80;
            const dedupeMs = 15000;

            function classify(level) {
                if (level === 'error') return { dot: 'issue-dot-error', badge: 'Error', text: 'text-red-300' };
                if (level === 'warning') return { dot: 'issue-dot-warning', badge: 'Warning', text: 'text-amber-300' };
                return { dot: 'issue-dot-info', badge: 'Info', text: 'text-cyan-300' };
            }

            function nowLabel() {
                return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            function normalizeMessage(message) {
                const text = (message || '').toString();
                const low = text.toLowerCase();

                if (low.includes('invalid_client') || low.includes('oauth') || low.includes('token expired')) {
                    return {
                        title: 'Connector authorization expired',
                        message: 'This connector requires re-authorization. Disconnect and connect it again.',
                        level: 'warning'
                    };
                }

                if (low.includes('unauthorized') || low.includes('session') || low.includes('401')) {
                    return {
                        title: 'Session expired',
                        message: 'Please log in again to continue connector operations.',
                        level: 'warning'
                    };
                }

                if (low.includes('networkerror') || low.includes('failed to fetch')) {
                    return {
                        title: 'Network request failed',
                        message: 'Unable to reach the server. Check connection and retry.',
                        level: 'error'
                    };
                }

                return null;
            }

            function pushIssue(payload) {
                const level = payload.level || 'error';
                const title = payload.title || 'Operation failed';
                const message = payload.message || 'An unexpected issue occurred.';
                const source = payload.source || 'client';
                const status = payload.status || '';
                const normalized = normalizeMessage([title, message, status].join(' '));
                const finalLevel = normalized?.level || level;
                const finalTitle = normalized?.title || title;
                const finalMessage = normalized?.message || message;
                const fingerprint = [finalLevel, finalTitle, finalMessage, source].join('|');
                const ts = Date.now();

                if (seen.has(fingerprint) && (ts - seen.get(fingerprint)) < dedupeMs) return;
                seen.set(fingerprint, ts);

                const evt = {
                    level: finalLevel,
                    title: finalTitle,
                    message: finalMessage,
                    source: source,
                    status: status,
                    at: nowLabel()
                };

                events.unshift(evt);
                if (events.length > maxEvents) events.pop();
                renderList();
                showToast(evt);
            }

            function showToast(evt) {
                if (!toastStack) return;
                const cls = classify(evt.level);
                const toast = document.createElement('div');
                toast.className = 'pointer-events-auto rounded-xl border border-slate-700/70 bg-slate-900/95 p-4 shadow-2xl';
                toast.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="w-2.5 h-2.5 rounded-full mt-1 ${cls.dot}"></span>
                        <div class="min-w-0">
                            <p class="text-sm font-bold ${cls.text}">${evt.title}</p>
                            <p class="text-xs text-slate-300 mt-1 break-words">${evt.message}</p>
                            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-wider">${evt.source} • ${evt.at}</p>
                        </div>
                    </div>`;
                toastStack.prepend(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-6px)';
                    toast.style.transition = 'all 0.25s ease';
                    setTimeout(() => toast.remove(), 260);
                }, 5200);
            }

            function renderList() {
                if (!list) return;
                if (!events.length) {
                    list.innerHTML = `<div class="issue-item rounded-xl p-4">
                        <p class="text-xs text-slate-400">No issues captured in this session.</p>
                    </div>`;
                    return;
                }

                list.innerHTML = events.map(evt => {
                    const cls = classify(evt.level);
                    const statusLine = evt.status ? `<p class="text-[10px] text-slate-500 mt-1">HTTP ${evt.status}</p>` : '';
                    return `<div class="issue-item rounded-xl p-4">
                        <div class="flex items-center justify-between gap-3">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full ${cls.dot}"></span>
                                <p class="text-xs font-bold ${cls.text}">${evt.title}</p>
                            </div>
                            <p class="text-[10px] text-slate-500">${evt.at}</p>
                        </div>
                        <p class="text-xs text-slate-300 mt-2 break-words">${evt.message}</p>
                        <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-wider">${evt.source}</p>
                        ${statusLine}
                    </div>`;
                }).join('');
            }

            function safeUrl(arg) {
                if (typeof arg === 'string') return arg;
                if (arg && typeof arg.url === 'string') return arg.url;
                return 'unknown';
            }

            function extractMessage(json, fallback) {
                if (!json || typeof json !== 'object') return fallback;
                return json.message || json.error || json.detail || fallback;
            }

            const originalFetch = window.fetch.bind(window);
            const originalAlert = window.alert ? window.alert.bind(window) : null;
            window.fetch = async function (...args) {
                const url = safeUrl(args[0]);
                try {
                    const response = await originalFetch(...args);
                    const contentType = response.headers.get('content-type') || '';
                    let payload = null;

                    if (contentType.includes('application/json')) {
                        try {
                            payload = await response.clone().json();
                        } catch (_) { }
                    }

                    if (!response.ok) {
                        let message = extractMessage(payload, `Request failed for ${url}`);
                        pushIssue({
                            level: response.status === 401 || response.status === 403 ? 'warning' : 'error',
                            title: 'Request failed',
                            message,
                            source: url,
                            status: response.status
                        });
                    } else if (payload && (payload.error || payload.status === 'error')) {
                        pushIssue({
                            level: 'error',
                            title: 'Connector operation failed',
                            message: extractMessage(payload, `Operation failed for ${url}`),
                            source: url
                        });
                    }

                    return response;
                } catch (err) {
                    pushIssue({
                        level: 'error',
                        title: 'Network error',
                        message: err?.message || 'Unable to complete request.',
                        source: url
                    });
                    throw err;
                }
            };

            window.addEventListener('unhandledrejection', (event) => {
                const reason = event?.reason;
                pushIssue({
                    level: 'error',
                    title: 'Unhandled async error',
                    message: reason?.message || String(reason || 'Unknown promise rejection'),
                    source: 'javascript'
                });
            });

            window.addEventListener('error', (event) => {
                pushIssue({
                    level: 'error',
                    title: 'JavaScript runtime error',
                    message: event?.message || 'Unknown runtime error',
                    source: 'javascript'
                });
            });

            function inferAlertLevel(message) {
                const text = (message || '').toString().toLowerCase();
                if (text.includes('error') || text.includes('failed') || text.includes('invalid')) return 'error';
                if (text.includes('required') || text.includes('missing') || text.includes('warning')) return 'warning';
                if (text.includes('success') || text.includes('updated') || text.includes('connected') || text.includes('revoked')) return 'info';
                return 'info';
            }

            function inferAlertTitle(message, level) {
                if (level === 'error') return 'Connector action failed';
                if (level === 'warning') return 'Action required';
                return 'Connector update';
            }

            window.alert = function (message) {
                const level = inferAlertLevel(message);
                pushIssue({
                    level,
                    title: inferAlertTitle(message, level),
                    message: message || 'Notification',
                    source: 'connector-ui'
                });
            };

            window.SegmentoIssues = {
                info: (message, title = 'Notice', source = 'ui') => pushIssue({ level: 'info', title, message, source }),
                warn: (message, title = 'Action needed', source = 'ui') => pushIssue({ level: 'warning', title, message, source }),
                error: (message, title = 'Operation failed', source = 'ui') => pushIssue({ level: 'error', title, message, source }),
                push: pushIssue,
                nativeAlert: (message) => {
                    if (originalAlert) originalAlert(message);
                }
            };

            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => panel.classList.toggle('hidden'));
            }

            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    events.length = 0;
                    seen.clear();
                    renderList();
                });
            }

            renderList();
        })();
    </script>

    <script>
        AOS.init({ duration: 900, once: true });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function enforceDestinationFormats(){

    const destSelect = document.getElementById("destinationType");
    if(!destSelect) return;

    const dest = destSelect.value;

    const json = document.getElementById("format-json");
    const parquet = document.getElementById("format-parquet");
    const iceberg = document.getElementById("format-iceberg");
    const formatField = document.getElementById("formatField");

    if(!formatField) return;

    // hide everything first
    if(json) json.style.display="none";
    if(parquet) parquet.style.display="none";
    if(iceberg) iceberg.style.display="none";

    if(dest === "s3" || dest === "azure_datalake"){

        formatField.classList.remove("hidden");

        if(json) json.style.display="flex";
        if(parquet) parquet.style.display="flex";
        if(iceberg) iceberg.style.display="flex";

    }
    else if(dest === "bigquery"){

        formatField.classList.remove("hidden");

        if(json) json.style.display="flex";
        if(parquet) parquet.style.display="flex";

    }
    else{

        formatField.classList.add("hidden");

    }

}

document.addEventListener("change", function(e){

    if(e.target && e.target.id === "destinationType"){
        enforceDestinationFormats();
    }

});

window.addEventListener("load", enforceDestinationFormats);

</script>
</body>

</html>
